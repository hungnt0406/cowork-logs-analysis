name: Release

# Push a version tag → GitHub builds the clean archives and publishes a Release.
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the Release and upload its assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the pushed tag
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # pinned to match DATA_FORMAT.md

      # Reuses the same `git archive`-based packaging as `bun run package` locally,
      # so CI and local builds are byte-for-byte identical. Needs no `bun install`
      # (the script uses only Bun built-ins). Version label comes from the tag.
      - name: Build clean release archives
        run: bun run package "${{ github.ref_name }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "dist/cowork-logs-analysis-${{ github.ref_name }}.tar.gz" \
            "dist/cowork-logs-analysis-${{ github.ref_name }}.zip" \
            --title "cowork-logs-analysis ${{ github.ref_name }}" \
            --generate-notes
